name: Build Windows EXE

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # windows-latest 预装了 vcpkg（C:\vcpkg）和 MSVC，直接用
      - name: Print tool versions
        shell: pwsh
        run: |
          cmake --version
          & "C:\vcpkg\vcpkg.exe" version

      # manifest 模式：vcpkg.json 声明的依赖会在 cmake configure 时自动安装
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Collect artifacts
        shell: pwsh
        run: |
          $dst = "pvz-portable-windows"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          # 主 exe
          Copy-Item build/Release/*.exe $dst/ -ErrorAction SilentlyContinue
          Copy-Item build/*.exe $dst/ -ErrorAction SilentlyContinue
          # 静态链接理论上不需要 DLL，但以防万一
          Copy-Item build/Release/*.dll $dst/ -ErrorAction SilentlyContinue
          Copy-Item build/*.dll $dst/ -ErrorAction SilentlyContinue
          # mods 目录（含 example_mod 和 FFI 自检）
          Copy-Item -Recurse mods $dst/mods
          Get-ChildItem $dst -Recurse | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvz-portable-windows-x64
          path: pvz-portable-windows/
          retention-days: 30
          compression-level: 9

      - name: Upload to Release (if release event)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: pvz-portable-windows/*
