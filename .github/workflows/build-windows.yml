name: Build Windows EXE (LuaJIT)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-msys2:
    name: Build for Windows (MSYS2 UCRT64 + LuaJIT)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-libjpeg-turbo
          mingw-w64-ucrt-x86_64-libopenmpt
          mingw-w64-ucrt-x86_64-libogg
          mingw-w64-ucrt-x86_64-libpng
          mingw-w64-ucrt-x86_64-libvorbis
          mingw-w64-ucrt-x86_64-luajit
          mingw-w64-ucrt-x86_64-mpg123
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-SDL2

    - name: Compile PvZ-Portable for Windows (with LuaJIT Mod API)
      shell: msys2 {0}
      run: |
        echo "=== LuaJIT debug info ==="
        pacman -Ql mingw-w64-ucrt-x86_64-luajit | grep -E '(\.h$|\.a$|\.pc$)' || true
        echo "=== pkg-config ==="
        pkg-config --cflags --libs luajit || true
        echo "=== CMake configure ==="
        mkdir build
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DCONSOLE=OFF -DBUILD_STATIC=ON -DCMAKE_COLOR_DIAGNOSTICS=ON -DCMAKE_VERBOSE_MAKEFILE=ON
        echo "=== CMake build ==="
        cmake --build build || (echo "=== RSP file content ==="; cat build/CMakeFiles/pvz-portable.rsp 2>/dev/null; exit 1)

        mkdir -p dist
        cp build/pvz-portable.exe dist/
        strip dist/pvz-portable.exe

    - name: Package with mods directory
      shell: pwsh
      run: |
        Copy-Item -Recurse mods dist/mods

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-windows-luajit-ucrt64
        path: dist/
        retention-days: 30

    - name: Upload to Release (if release event)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
